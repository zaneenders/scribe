openapi: 3.1.0
info:
  title: Anthropic Messages API (streaming subset)
  version: 1.0.0
  description: >
    Minimal surface for streaming Messages API. Works with Anthropic,
    Kimi Coding (api.kimi.com/coding), and other Anthropic-compatible providers.
servers:
  - url: https://api.anthropic.com
paths:
  /v1/messages:
    post:
      operationId: createMessage
      parameters:
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            default: "2023-06-01"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Server-Sent Events stream of message events
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/MessageStreamEvent"
        4XX:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    # ── Request ──────────────────────────────────────────────

    CreateMessageRequest:
      type: object
      required: [model, messages, max_tokens]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/InputMessage"
        system:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/RequestTextBlock"
          description: System prompt (top-level, not a message role).
        max_tokens:
          type: integer
          minimum: 1
          description: Maximum tokens to generate before stopping (required).
        stream:
          type: boolean
          default: true
        temperature:
          type: number
          minimum: 0
          maximum: 1
        tools:
          type: array
          items:
            $ref: "#/components/schemas/Tool"
        tool_choice:
          $ref: "#/components/schemas/ToolChoice"
      additionalProperties: true

    InputMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/InputContentBlock"
      additionalProperties: false

    InputContentBlock:
      discriminator:
        propertyName: type
        mapping:
          text: "#/components/schemas/RequestTextBlock"
          image: "#/components/schemas/RequestImageBlock"
          tool_use: "#/components/schemas/RequestToolUseBlock"
          tool_result: "#/components/schemas/RequestToolResultBlock"
      oneOf:
        - $ref: "#/components/schemas/RequestTextBlock"
        - $ref: "#/components/schemas/RequestImageBlock"
        - $ref: "#/components/schemas/RequestToolUseBlock"
        - $ref: "#/components/schemas/RequestToolResultBlock"

    RequestTextBlock:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string
      additionalProperties: false

    RequestImageBlock:
      type: object
      required: [type, source]
      properties:
        type:
          type: string
          enum: [image]
        source:
          type: object
          required: [type, media_type, data]
          properties:
            type:
              type: string
              enum: [base64]
            media_type:
              type: string
              enum: [image/jpeg, image/png, image/gif, image/webp]
            data:
              type: string
              format: byte
          additionalProperties: false
      additionalProperties: false

    RequestToolUseBlock:
      type: object
      required: [type, id, name, input]
      properties:
        type:
          type: string
          enum: [tool_use]
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true
      additionalProperties: false

    RequestToolResultBlock:
      type: object
      required: [type, tool_use_id]
      properties:
        type:
          type: string
          enum: [tool_result]
        tool_use_id:
          type: string
        is_error:
          type: boolean
        content:
          oneOf:
            - type: string
            - type: array
              items:
                discriminator:
                  propertyName: type
                  mapping:
                    text: "#/components/schemas/RequestTextBlock"
                    image: "#/components/schemas/RequestImageBlock"
                oneOf:
                  - $ref: "#/components/schemas/RequestTextBlock"
                  - $ref: "#/components/schemas/RequestImageBlock"
      additionalProperties: false

    # ── Tools ─────────────────────────────────────────────────

    Tool:
      type: object
      required: [name, input_schema]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[a-zA-Z0-9_-]{1,64}$'
        description:
          type: string
        input_schema:
          type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [object]
            properties:
              type: object
              additionalProperties: true
          additionalProperties: true
      additionalProperties: false

    ToolChoice:
      discriminator:
        propertyName: type
        mapping:
          auto: "#/components/schemas/ToolChoiceAuto"
          any: "#/components/schemas/ToolChoiceAny"
          tool: "#/components/schemas/ToolChoiceTool"
      oneOf:
        - $ref: "#/components/schemas/ToolChoiceAuto"
        - $ref: "#/components/schemas/ToolChoiceAny"
        - $ref: "#/components/schemas/ToolChoiceTool"

    ToolChoiceAuto:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [auto]
        disable_parallel_tool_use:
          type: boolean
      additionalProperties: false

    ToolChoiceAny:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [any]
        disable_parallel_tool_use:
          type: boolean
      additionalProperties: false

    ToolChoiceTool:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          enum: [tool]
        name:
          type: string
        disable_parallel_tool_use:
          type: boolean
      additionalProperties: false

    # ── Response (non-streaming, used by message_start event) ─

    Message:
      type: object
      required: [id, type, role, content, model, stop_reason, stop_sequence, usage]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [message]
        role:
          type: string
          enum: [assistant]
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContentBlock"
        model:
          type: string
        stop_reason:
          type: [string, "null"]
          enum: [end_turn, max_tokens, stop_sequence, tool_use, null]
        stop_sequence:
          type: [string, "null"]
        usage:
          $ref: "#/components/schemas/Usage"

    ContentBlock:
      discriminator:
        propertyName: type
        mapping:
          text: "#/components/schemas/ResponseTextBlock"
          tool_use: "#/components/schemas/ResponseToolUseBlock"
      oneOf:
        - $ref: "#/components/schemas/ResponseTextBlock"
        - $ref: "#/components/schemas/ResponseToolUseBlock"

    ResponseTextBlock:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string

    ResponseToolUseBlock:
      type: object
      required: [type, id, name, input]
      properties:
        type:
          type: string
          enum: [tool_use]
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true

    Usage:
      type: object
      required: [input_tokens, output_tokens]
      properties:
        input_tokens:
          type: integer
        cache_creation_input_tokens:
          type: [integer, "null"]
        cache_read_input_tokens:
          type: [integer, "null"]
        output_tokens:
          type: integer

    # ── Streaming Events ──────────────────────────────────────

    MessageStreamEvent:
      discriminator:
        propertyName: type
        mapping:
          message_start: "#/components/schemas/MessageStartEvent"
          content_block_start: "#/components/schemas/ContentBlockStartEvent"
          content_block_delta: "#/components/schemas/ContentBlockDeltaEvent"
          content_block_stop: "#/components/schemas/ContentBlockStopEvent"
          message_delta: "#/components/schemas/MessageDeltaEvent"
          message_stop: "#/components/schemas/MessageStopEvent"
      oneOf:
        - $ref: "#/components/schemas/MessageStartEvent"
        - $ref: "#/components/schemas/ContentBlockStartEvent"
        - $ref: "#/components/schemas/ContentBlockDeltaEvent"
        - $ref: "#/components/schemas/ContentBlockStopEvent"
        - $ref: "#/components/schemas/MessageDeltaEvent"
        - $ref: "#/components/schemas/MessageStopEvent"

    MessageStartEvent:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [message_start]
        message:
          $ref: "#/components/schemas/Message"

    ContentBlockStartEvent:
      type: object
      required: [type, index, content_block]
      properties:
        type:
          type: string
          enum: [content_block_start]
        index:
          type: integer
        content_block:
          discriminator:
            propertyName: type
            mapping:
              text: "#/components/schemas/ResponseTextBlock"
              tool_use: "#/components/schemas/ResponseToolUseBlock"
          oneOf:
            - $ref: "#/components/schemas/ResponseTextBlock"
            - $ref: "#/components/schemas/ResponseToolUseBlock"

    ContentBlockDeltaEvent:
      type: object
      required: [type, index, delta]
      properties:
        type:
          type: string
          enum: [content_block_delta]
        index:
          type: integer
        delta:
          discriminator:
            propertyName: type
            mapping:
              text_delta: "#/components/schemas/TextContentBlockDelta"
              input_json_delta: "#/components/schemas/InputJsonContentBlockDelta"
          oneOf:
            - $ref: "#/components/schemas/TextContentBlockDelta"
            - $ref: "#/components/schemas/InputJsonContentBlockDelta"

    TextContentBlockDelta:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text_delta]
        text:
          type: string

    InputJsonContentBlockDelta:
      type: object
      required: [type, partial_json]
      properties:
        type:
          type: string
          enum: [input_json_delta]
        partial_json:
          type: string

    ContentBlockStopEvent:
      type: object
      required: [type, index]
      properties:
        type:
          type: string
          enum: [content_block_stop]
        index:
          type: integer

    MessageDeltaEvent:
      type: object
      required: [type, delta, usage]
      properties:
        type:
          type: string
          enum: [message_delta]
        delta:
          $ref: "#/components/schemas/MessageDelta"
        usage:
          $ref: "#/components/schemas/MessageDeltaUsage"

    MessageDelta:
      type: object
      required: [stop_reason, stop_sequence]
      properties:
        stop_reason:
          type: [string, "null"]
          enum: [end_turn, max_tokens, stop_sequence, tool_use, null]
        stop_sequence:
          type: [string, "null"]

    MessageDeltaUsage:
      type: object
      required: [output_tokens]
      properties:
        output_tokens:
          type: integer

    MessageStopEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [message_stop]

    # ── Errors ────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          enum: [error]
        error:
          discriminator:
            propertyName: type
            mapping:
              api_error: "#/components/schemas/APIError"
              authentication_error: "#/components/schemas/AuthenticationError"
              invalid_request_error: "#/components/schemas/InvalidRequestError"
              not_found_error: "#/components/schemas/NotFoundError"
              overloaded_error: "#/components/schemas/OverloadedError"
              permission_error: "#/components/schemas/PermissionError"
              rate_limit_error: "#/components/schemas/RateLimitError"
          oneOf:
            - $ref: "#/components/schemas/APIError"
            - $ref: "#/components/schemas/AuthenticationError"
            - $ref: "#/components/schemas/InvalidRequestError"
            - $ref: "#/components/schemas/NotFoundError"
            - $ref: "#/components/schemas/OverloadedError"
            - $ref: "#/components/schemas/PermissionError"
            - $ref: "#/components/schemas/RateLimitError"

    APIError:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [api_error]
        message:
          type: string

    AuthenticationError:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [authentication_error]
        message:
          type: string

    InvalidRequestError:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [invalid_request_error]
        message:
          type: string

    NotFoundError:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [not_found_error]
        message:
          type: string

    OverloadedError:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [overloaded_error]
        message:
          type: string

    PermissionError:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [permission_error]
        message:
          type: string

    RateLimitError:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [rate_limit_error]
        message:
          type: string
