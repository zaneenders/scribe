name: CI

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to acknowledge when CI starts
        required: false
        type: string
  pull_request:
    types: [closed]
    branches: [main]
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ack:
    name: Acknowledge
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.pr_number != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(context.payload.inputs.pr_number);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body:
                `CI is running on \`${context.refName}\`. ` +
                `[View run](${runUrl})`,
            });

  setup:
    name: Setup
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    container: swift:latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache Static SDK
        id: cache-sdk
        uses: actions/cache@v6
        with:
          path: /root/.swiftpm/swift-sdks
          key: swift-static-sdk-6.3.2-v2
      - name: Download Static SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          swift sdk install https://download.swift.org/swift-6.3.2-release/static-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz --checksum 3fd798bef6f4408f1ea5a6f94ce4d4052830c4326ab85ebc04f983f01b3da407
      - name: Cache Swift packages
        id: cache-spm
        uses: actions/cache@v6
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: spm-${{ hashFiles('Package.resolved') }}
      - name: Resolve dependencies
        if: steps.cache-spm.outputs.cache-hit != 'true'
        run: swift package resolve

  build:
    name: Build (${{ matrix.arch }})
    needs: setup
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    container: swift:latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7
      - name: Restore Static SDK
        uses: actions/cache@v6
        with:
          path: /root/.swiftpm/swift-sdks
          key: swift-static-sdk-6.3.2-v2
      - name: Restore Swift packages
        uses: actions/cache@v6
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: spm-${{ hashFiles('Package.resolved') }}
      - name: Build ${{ matrix.arch }}
        run: swift build --swift-sdk ${{ matrix.arch }}-swift-linux-musl -c release
      - name: Upload ${{ matrix.arch }}
        uses: actions/upload-artifact@v7
        with:
          name: scribe-${{ matrix.arch }}
          path: |
            .build/${{ matrix.arch }}-swift-linux-musl/release/scribe

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: scribe-*
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            scribe-x86_64/*
            scribe-aarch64/*
          generate_release_notes: true
